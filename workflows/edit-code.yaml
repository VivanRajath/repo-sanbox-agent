name: edit-code
description: Apply a natural language edit to a file in the repo.
version: 1.0.0

trigger:
  type: user_message
  pattern: "change|edit|add|remove|update|fix|rename|make"

steps:
  - id: load_context
    type: memory_read
    path: memory/MEMORY.md
    output: repo_context

  - id: route_intent
    agent: intent-router
    skill: route-intent
    input:
      instruction: "{{user.message}}"
      file_structure: "{{repo_context.file_structure}}"
      context_summary: "{{repo_context.context_summary}}"
    output: tier

  - id: edit
    agent: code-editor
    skill: apply-edit
    input:
      instruction: "{{user.message}}"
      repo_path: "{{repo_context.repo}}"
      runtime: "{{repo_context.runtime}}"
      framework: "{{repo_context.framework}}"
      tier: "{{tier}}"
    delegates_to:
      jnr: jnr-developer
      snr: snr-developer
      architect: architect
    output: edit_result

  - id: respond
    type: respond
    message: "{{edit_result}}"